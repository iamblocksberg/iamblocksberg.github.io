<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep PC</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
      }
      button {
        font-size: 20px;
        padding: 10px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Put PC to Sleep</h1>
    <button onclick="putToSleep()">Sleep Now</button>

    <script>
      function putToSleep() {
        fetch("/sleep")
          .then((response) => response.text())
          .then((data) => {
            alert(data);
          })
          .catch((error) => {
            alert("Failed to put PC to sleep");
          });
      }
    </script>
  </body>
</html>
